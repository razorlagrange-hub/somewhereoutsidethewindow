<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>parking</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body{background:#1a1a18;overflow:hidden;}
  #scene{position:fixed;top:0;left:0;width:100%;height:100%;}
  #scene img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;filter:brightness(0.82);}
  #fade{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;opacity:1;pointer-events:none;z-index:9000;transition:opacity 0.45s;}
  #btn-back{position:fixed;top:4%;left:3%;cursor:pointer;z-index:100;overflow:visible;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.7));}
  #btn-fwd{position:fixed;bottom:10%;left:calc(50% - 35px);cursor:pointer;z-index:100;overflow:visible;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.7));}

  #door-zone{position:fixed;left:0;top:0;width:28%;height:100%;z-index:50;cursor:pointer;}
  #door-hint{position:fixed;left:14%;top:45%;transform:translate(-50%,-50%);opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:200;}
</style>
</head>
<body>
  <div id="fade"></div>
  <div id="scene"><img src="images/park4.jpg" alt=""></div>
  <div id="door-zone" onmouseenter="document.getElementById('door-hint').style.opacity=1" onmouseleave="document.getElementById('door-hint').style.opacity=0" onclick="nav('park_door.html')"></div>
  <svg id="door-hint" width="60" height="38" viewBox="0 0 60 38">
    <path d="M5,5 C4,2 8,1 10,3 C12,1 50,1 55,5 C58,9 58,29 55,33 C50,37 12,37 10,35 C8,37 4,36 5,33 C2,29 2,9 5,5 Z" fill="#f5e234" stroke="#cc9900" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="30" y="24" font-family="'Comic Sans MS','Chalkboard SE',cursive" font-size="16" font-weight="bold" fill="#7a5000" text-anchor="middle">?</text>
  </svg>
  <svg id="btn-back" onclick="nav('park_page3.html')" width="130" height="52" viewBox="0 0 130 52">
  <path d="M12,8 C10,5 14,3 16,5 C18,3 112,2 118,6 C124,10 126,14 124,20 C126,26 124,40 118,44 C112,48 18,49 16,47 C14,49 10,47 12,44 C8,40 8,14 12,8 Z" fill="#ff7733" stroke="#cc3300" stroke-width="3" stroke-linejoin="round"/>
  <path d="M28,26 L20,26 M24,20 L18,26 L24,32" stroke="#551100" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="78" y="31" font-family="'Comic Sans MS','Chalkboard SE',cursive" font-size="15" font-weight="bold" fill="#551100" text-anchor="middle">go back</text>
</svg>
  <svg id="btn-fwd" onclick="nav('park_page5.html')" width="70" height="70" viewBox="0 0 70 70">
  <path d="M18,52 C16,51 17,49 18,48 L33,28 C34,26 36,26 37,28 L52,48 C54,50 52,52 50,51 L42,51 L42,56 C42,58 40,60 38,60 L32,60 C30,60 28,58 28,56 L28,51 L20,51 C19,52 19,53 18,52 Z" fill="#f5e234" stroke="#cc9900" stroke-width="2.5" stroke-linejoin="round"/>
</svg>
<script>
  setTimeout(()=>document.getElementById('fade').style.opacity='0',80);
  function nav(url){
    const f=document.getElementById('fade');
    f.style.opacity='1';
    setTimeout(()=>window.location.href=url,450);
  }
  // hover scale via JS — no CSS transform conflict
  ['btn-back','btn-fwd'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.addEventListener('mouseenter',()=>el.style.transform='scale(1.15)');
    el.addEventListener('mouseleave',()=>el.style.transform='scale(1)');
    el.addEventListener('mousedown',()=>el.style.transform='scale(0.92)');
    el.addEventListener('mouseup',()=>el.style.transform='scale(1.15)');
  });
</script>
</body>
</html>
