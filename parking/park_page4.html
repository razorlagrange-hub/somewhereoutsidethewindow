<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>parking</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body{background:#1a1a18;overflow:hidden;}
  #scene{position:fixed;top:0;left:0;width:100%;height:100%;}
  #scene img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;filter:brightness(0.82);}
  #fade{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;opacity:1;pointer-events:none;z-index:9000;transition:opacity 0.45s;}

  /* zone porte — couvre la porte métal gauche */
  #door-zone{
    position:fixed;
    left:0; top:0;
    width:28%; height:100%;
    z-index:50;
    cursor:pointer;
  }

  /* hint centré sur la porte */
  #door-hint{
    position:fixed;
    left:14%; top:45%;
    transform:translate(-50%,-50%);
    opacity:0;
    transition:opacity 0.2s;
    pointer-events:none;
    z-index:200;
  }
  #door-zone:hover ~ #door-hint{ opacity:1; }

  /* boutons wrapper pour éviter le bug de transform */
  .btn-wrap{
    position:fixed;
    z-index:100;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,0.7));
  }
  .btn-wrap svg{ cursor:pointer; overflow:visible; display:block; transition:transform 0.1s; }
  .btn-wrap svg:hover{ transform:scale(1.15); }
  .btn-wrap svg:active{ transform:scale(0.9); }

  #btn-back{ top:4%; left:3%; }
  #btn-fwd{ bottom:10%; left:50%; transform:translateX(-50%); }
</style>
</head>
<body>
  <div id="fade"></div>
  <div id="scene"><img src="images/park4.jpg" alt=""></div>

  <!-- zone porte cliquable -->
  <div id="door-zone" onclick="nav('park_door.html')"></div>

  <!-- hint ? centré sur la porte -->
  <svg id="door-hint" width="80" height="38" viewBox="0 0 80 38">
    <path d="M6,5 C5,2 10,1 12,3 C14,1 68,1 74,5 C78,9 78,29 74,33 C68,37 14,37 12,35 C10,37 5,36 6,33 C2,29 2,9 6,5 Z"
      fill="#f5e234" stroke="#cc9900" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="40" y="24" font-family="'Comic Sans MS','Chalkboard SE',cursive" font-size="16" font-weight="bold" fill="#7a5000" text-anchor="middle">?</text>
  </svg>

  <!-- go back -->
  <div class="btn-wrap" id="btn-back">
    <svg onclick="nav('park_page3.html')" width="130" height="52" viewBox="0 0 130 52">
      <path d="M12,8 C10,5 14,3 16,5 C18,3 112,2 118,6 C124,10 126,14 124,20 C126,26 124,40 118,44 C112,48 18,49 16,47 C14,49 10,47 12,44 C8,40 8,14 12,8 Z" fill="#ff7733" stroke="#cc3300" stroke-width="3" stroke-linejoin="round"/>
      <path d="M28,26 L20,26 M24,20 L18,26 L24,32" stroke="#551100" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="78" y="31" font-family="'Comic Sans MS','Chalkboard SE',cursive" font-size="15" font-weight="bold" fill="#551100" text-anchor="middle">go back</text>
    </svg>
  </div>

  <!-- flèche avant -->
  <div class="btn-wrap" id="btn-fwd">
    <svg onclick="nav('park_page5.html')" width="70" height="70" viewBox="0 0 70 70">
      <path d="M18,52 C16,51 17,49 18,48 L33,28 C34,26 36,26 37,28 L52,48 C54,50 52,52 50,51 L42,51 L42,56 C42,58 40,60 38,60 L32,60 C30,60 28,58 28,56 L28,51 L20,51 C19,52 19,53 18,52 Z" fill="#f5e234" stroke="#cc9900" stroke-width="2.5" stroke-linejoin="round"/>
    </svg>
  </div>

<script>
  setTimeout(()=>document.getElementById('fade').style.opacity='0',80);
  function nav(url){
    const f=document.getElementById('fade');
    f.style.transition='opacity 0.45s';
    f.style.opacity='1';
    setTimeout(()=>window.location.href=url,450);
  }
</script>
</body>
</html>
