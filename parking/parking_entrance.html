<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>parking</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  * { cursor: none !important; }
  body { background: #1a1a1a; overflow: hidden; }

  /* CUSTOM CURSOR — hand pointer style 90s */
  #cursor {
    position: fixed;
    width: 48px;
    height: 48px;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-8px, -4px);
    transition: transform 0.05s;
  }

  /* SCENE */
  #scene {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
  }
  #scene img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    filter: brightness(0.75);
  }

  /* NAVIGATION ARROWS — 90s style */
  .arrow-btn {
    position: fixed;
    z-index: 100;
    background: #f5e642;
    border: 4px solid #c8a800;
    border-bottom: 7px solid #8a6e00;
    border-right: 7px solid #8a6e00;
    border-radius: 14px;
    width: 64px; height: 64px;
    display: flex; align-items: center; justify-content: center;
    cursor: none;
    transition: transform 0.08s, filter 0.08s;
    box-shadow: 0 4px 18px rgba(0,0,0,0.6);
  }
  .arrow-btn:hover {
    transform: scale(1.12);
    filter: brightness(1.15);
  }
  .arrow-btn:active {
    transform: scale(0.95);
    border-bottom-width: 4px;
    border-right-width: 4px;
  }
  .arrow-btn svg { width: 32px; height: 32px; fill: #5a3d00; }

  #arrow-forward {
    bottom: 12%;
    left: 50%;
    transform: translateX(-50%);
  }
  #arrow-forward:hover { transform: translateX(-50%) scale(1.12); }
  #arrow-forward:active { transform: translateX(-50%) scale(0.95); }

  /* BACK BUTTON — top left, 90s style */
  #back-btn {
    position: fixed;
    top: 4%; left: 3%;
    z-index: 100;
    background: #e8e8e8;
    border: 4px solid #aaa;
    border-bottom: 7px solid #666;
    border-right: 7px solid #666;
    border-radius: 14px;
    padding: 8px 18px;
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Courier New', monospace;
    font-size: 13px;
    font-weight: bold;
    color: #333;
    cursor: none;
    display: flex; align-items: center; gap: 6px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
    transition: transform 0.08s;
    text-decoration: none;
  }
  #back-btn:hover { transform: scale(1.08); filter: brightness(1.1); }
  #back-btn:active { transform: scale(0.95); border-bottom-width: 4px; border-right-width: 4px; }

  /* HOTSPOT — porte fermée gauche */
  #door-left {
    position: fixed;
    left: 8%; top: 20%;
    width: 18%; height: 65%;
    z-index: 50;
    cursor: none;
  }
  #door-left:hover ~ #door-label { opacity: 1; }

  /* LABEL hover */
  #door-label {
    position: fixed;
    left: 3%; top: 50%;
    transform: translateY(-50%);
    background: #f5e642;
    border: 3px solid #c8a800;
    border-radius: 10px;
    padding: 6px 12px;
    font-family: 'Comic Sans MS', 'Chalkboard SE', monospace;
    font-size: 12px;
    font-weight: bold;
    color: #5a3d00;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 200;
    white-space: nowrap;
  }

  /* FADE */
  #fade {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: #000; opacity: 0;
    pointer-events: none; z-index: 9000;
    transition: opacity 0.5s;
  }
  #fade.out { opacity: 1; }
</style>
</head>
<body>
  <div id="fade"></div>

  <!-- CURSOR SVG — 90s hand pointer -->
  <svg id="cursor" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(8,2)">
      <!-- palm -->
      <rect x="4" y="18" width="22" height="22" rx="5" fill="#ffe0b2" stroke="#333" stroke-width="2"/>
      <!-- index finger -->
      <rect x="10" y="4" width="8" height="20" rx="4" fill="#ffe0b2" stroke="#333" stroke-width="2"/>
      <!-- middle finger -->
      <rect x="20" y="8" width="7" height="16" rx="3.5" fill="#ffe0b2" stroke="#333" stroke-width="2"/>
      <!-- ring finger -->
      <rect x="1" y="12" width="7" height="14" rx="3.5" fill="#ffe0b2" stroke="#333" stroke-width="2"/>
      <!-- fingernail index -->
      <ellipse cx="14" cy="7" rx="2.5" ry="2" fill="#ffb3b3" stroke="#ccc" stroke-width="0.8"/>
    </g>
  </svg>

  <div id="scene">
    <img src="parking_screen1.jpg" alt="">
  </div>

  <!-- hotspot porte fermée gauche -->
  <div id="door-left" onclick="goTo('parking_door_closed.html')"></div>
  <div id="door-label">?</div>

  <!-- flèche avant — porte ouverte -->
  <button class="arrow-btn" id="arrow-forward" onclick="navigate('parking_main.html')">
    <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
  </button>

  <!-- retour hub -->
  <a id="back-btn" href="../hub.html">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="#333"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    back
  </a>

<script>
  // cursor follow
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });

  // cursor squeeze on click
  document.addEventListener('mousedown', () => cursor.style.transform = 'translate(-8px,-4px) scale(0.85)');
  document.addEventListener('mouseup', () => cursor.style.transform = 'translate(-8px,-4px) scale(1)');

  const fade = document.getElementById('fade');

  function navigate(url) {
    fade.classList.add('out');
    setTimeout(() => window.location.href = url, 500);
  }
  function goTo(url) { navigate(url); }

  // fade in on load
  setTimeout(() => fi_done(), 100);
  function fi_done(){
    fade.style.opacity = '0';
  }
</script>
</body>
</html>
